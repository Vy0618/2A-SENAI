<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - PetShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Playfair Display', 'Georgia', 'serif'],
                        body: ['DM Sans', 'sans-serif'],
                    },
                    colors: {
                        cream: '#FDF6EC',
                        'warm-white': '#FEFAF4',
                        teal: { DEFAULT: '#1A7A6E', light: '#2A9D8F', dark: '#0D5C52' },
                        amber: { DEFAULT: '#E9A84C', light: '#F4C07A' },
                        charcoal: '#1C2321',
                        border: '#E2D9CC',
                        muted: '#8A8F8D',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                    animation: { 'slide-up': 'slideUp 0.25s ease forwards' },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body class="bg-cream font-body text-charcoal min-h-screen flex flex-col">
    <nav class="bg-warm-white border-b border-border sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-[72px] flex items-center justify-between gap-6">
            <a href="main.html" class="flex items-center gap-2 group no-underline">
                <div class="w-10 h-10 bg-teal rounded-full flex items-center justify-center text-white text-lg flex-shrink-0">
                    <i class="fa-solid fa-paw"></i>
                </div>
                <span class="font-display text-2xl font-black text-charcoal group-hover:text-teal transition-colors">PetShop</span>
            </a>

            <div class="hidden md:flex flex-1 max-w-lg border-[1.5px] border-border rounded-full overflow-hidden focus-within:border-teal-light focus-within:ring-2 focus-within:ring-teal-light/20 transition-all">
                <input type="text" placeholder="Buscar produtos..."
                    class="flex-1 px-5 py-2.5 bg-transparent outline-none text-sm text-charcoal placeholder-muted font-body">
                <button class="bg-teal hover:bg-teal-dark px-5 text-white text-sm transition-colors">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <div class="flex items-center gap-1">
                <div data-auth-area class="flex items-center gap-1"></div>
                <button title="Carrinho" onclick="PetCart.openCart()" class="relative w-10 h-10 rounded-full flex items-center justify-center hover:bg-cream hover:text-amber transition-all">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span data-cart-count class="hidden absolute -top-1 -right-1 min-w-5 h-5 px-1 rounded-full bg-amber text-charcoal text-xs font-bold flex items-center justify-center"></span>
                </button>
                <a data-admin-only href="admin.html" title="Administradores"
                    class="hidden w-10 h-10 rounded-full items-center justify-center hover:bg-cream hover:text-teal transition-all">
                    <i class="fa-solid fa-user-shield"></i>
                </a>
                <button data-admin-only onclick="abrirProdutos()"
                    class="hidden items-center gap-1.5 bg-teal hover:bg-teal-dark text-white text-sm font-semibold px-4 py-2 rounded-full transition-all hover:-translate-y-0.5">
                    <i class="fa-solid fa-plus text-xs"></i> Novo produto
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1">
        <div class="max-w-7xl mx-auto px-6 pt-10 pb-4">
            <h2 class="font-display text-3xl font-bold text-charcoal">Produtos</h2>
            <div class="mt-1.5 w-10 h-[3px] bg-amber rounded-full"></div>
        </div>

        <div class="max-w-7xl mx-auto px-6 pb-16">
            <div id="sectionsprodutos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5"></div>
        </div>
    </main>

    <div id="overlayP" class="fixed inset-0 bg-charcoal/60 backdrop-blur-sm hidden items-center justify-center z-[200] px-4">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md relative shadow-[0_30px_80px_rgba(0,0,0,0.25)] animate-slide-up max-h-[90vh] overflow-y-auto">
            <button type="button" onclick="fecharProdutos()"
                class="absolute top-5 right-5 w-8 h-8 rounded-full bg-cream hover:bg-border flex items-center justify-center text-sm transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <h2 class="font-display text-2xl font-bold text-charcoal mb-1">Novo produto</h2>
            <p class="text-muted text-sm mb-7">Preencha os dados para adicionar um produto.</p>

            <form id="produtoForm" class="space-y-4">
                <div>
                    <label class="block text-[11px] font-semibold tracking-widest uppercase text-charcoal mb-1.5">Nome</label>
                    <input id="produtoNome" type="text" placeholder="Nome do produto"
                        class="w-full px-4 py-3 border-[1.5px] border-border rounded-xl bg-warm-white text-charcoal text-sm outline-none focus:border-teal-light focus:ring-2 focus:ring-teal-light/10 focus:bg-white transition-all placeholder-muted">
                </div>

                <div>
                    <label class="block text-[11px] font-semibold tracking-widest uppercase text-charcoal mb-1.5">Descricao</label>
                    <input id="produtoDescricao" type="text" placeholder="Descricao"
                        class="w-full px-4 py-3 border-[1.5px] border-border rounded-xl bg-warm-white text-charcoal text-sm outline-none focus:border-teal-light focus:ring-2 focus:ring-teal-light/10 focus:bg-white transition-all placeholder-muted">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-semibold tracking-widest uppercase text-charcoal mb-1.5">Preco</label>
                        <input id="produtoPreco" type="number" step="0.01" placeholder="0,00"
                            class="w-full px-4 py-3 border-[1.5px] border-border rounded-xl bg-warm-white text-charcoal text-sm outline-none focus:border-teal-light focus:ring-2 focus:ring-teal-light/10 focus:bg-white transition-all placeholder-muted">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold tracking-widest uppercase text-charcoal mb-1.5">Preco c/ desconto</label>
                        <input id="produtoPrecoDesconto" type="number" step="0.01" placeholder="0,00"
                            class="w-full px-4 py-3 border-[1.5px] border-border rounded-xl bg-warm-white text-charcoal text-sm outline-none focus:border-teal-light focus:ring-2 focus:ring-teal-light/10 focus:bg-white transition-all placeholder-muted">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-semibold tracking-widest uppercase text-charcoal mb-1.5">Estoque</label>
                        <input id="produtoEstoque" type="number" placeholder="0"
                            class="w-full px-4 py-3 border-[1.5px] border-border rounded-xl bg-warm-white text-charcoal text-sm outline-none focus:border-teal-light focus:ring-2 focus:ring-teal-light/10 focus:bg-white transition-all placeholder-muted">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold tracking-widest uppercase text-charcoal mb-1.5">ID da categoria</label>
                        <input id="produtoCategoria" type="number" placeholder="1"
                            class="w-full px-4 py-3 border-[1.5px] border-border rounded-xl bg-warm-white text-charcoal text-sm outline-none focus:border-teal-light focus:ring-2 focus:ring-teal-light/10 focus:bg-white transition-all placeholder-muted">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-semibold tracking-widest uppercase text-charcoal mb-1.5">Imagem</label>
                    <input id="produtoImagem" type="file" accept="image/*"
                        class="w-full px-4 py-3 border-[1.5px] border-border rounded-xl bg-warm-white text-charcoal text-sm outline-none file:mr-3 file:border-0 file:bg-teal file:text-white file:rounded-lg file:px-3 file:py-1.5 file:font-semibold focus:border-teal-light focus:ring-2 focus:ring-teal-light/10 focus:bg-white transition-all">
                </div>

                <button type="submit"
                    class="w-full bg-teal hover:bg-teal-dark text-white font-semibold py-3.5 rounded-xl transition-all hover:-translate-y-0.5 mt-1">
                    Salvar produto
                </button>
            </form>

            <p id="produtoErro" class="text-red-500 text-sm mt-3"></p>
            <p id="produtoResultado" class="text-teal text-sm mt-3"></p>
        </div>
    </div>

    <footer class="bg-charcoal text-white/70 py-14">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10 mb-10">
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-8 h-8 bg-teal rounded-full flex items-center justify-center text-white text-sm"><i class="fa-solid fa-paw"></i></div>
                        <span class="font-display text-lg font-bold text-white">PetShop</span>
                    </div>
                    <p class="text-sm leading-relaxed">Cuidado, amor e os melhores produtos para o seu animal de estimacao.</p>
                </div>

                <div>
                    <h3 class="text-[11px] font-semibold uppercase text-white mb-4">Categorias</h3>
                    <ul id="catfooter" class="space-y-2 text-sm"></ul>
                </div>

                <div>
                    <h3 class="text-[11px] font-semibold tracking-[0.1em] uppercase text-white mb-4">Redes Sociais</h3>
                    <div class="flex gap-3">
                        <a href="#" class="w-9 h-9 bg-white/10 hover:bg-teal text-white/70 hover:text-white rounded-lg flex items-center justify-center transition-all"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#" class="w-9 h-9 bg-white/10 hover:bg-teal text-white/70 hover:text-white rounded-lg flex items-center justify-center transition-all"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" class="w-9 h-9 bg-white/10 hover:bg-teal text-white/70 hover:text-white rounded-lg flex items-center justify-center transition-all"><i class="fa-brands fa-twitter"></i></a>
                        <a href="#" class="w-9 h-9 bg-white/10 hover:bg-teal text-white/70 hover:text-white rounded-lg flex items-center justify-center transition-all"><i class="fa-brands fa-youtube"></i></a>
                    </div>
                </div>
            </div>
            <hr class="border-white/10 mb-6">
            <p class="text-xs text-white/35 text-center">&copy; 2026 PetShop. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="js/imageUtils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/fetchCategorias.js"></script>
    <script src="js/fetchProdutos.js"></script>
</body>

</html>
